# Render and Railway inject PORT automatically
server:
  port: ${PORT:8762}

spring:
  application:
    name: dummy-echo-service

eureka:
  client:
    service-url:
      # Set EUREKA_URL in Render/Railway environment variables
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: ${EUREKA_FETCH:true}
    register-with-eureka: ${EUREKA_REGISTER:true}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info