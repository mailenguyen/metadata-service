      defaultZone: https://microservice-i7nc.onrender.com/eureka/
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_INSTANCE_HOSTNAME:7fc3-118-69-61-33.ngrok-free.app}
    instance-id: ${spring.application.name}:${random.value}

    secure-port-enabled: true
    non-secure-port-enabled: false

    home-page-url: https://${eureka.instance.hostname}/
    status-page-url: https://${eureka.instance.hostname}/actuator/info
    health-check-url: https://${eureka.instance.hostname}/actuator/health

metadata:
  key:
    pattern: "^[a-zA-Z_][a-zA-Z0-9_.]*$"

management:
  endpoints:
    web:
      exposure:
        include: health,info