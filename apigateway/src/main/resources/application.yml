server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false

resilience4j:
  circuitbreaker:
    instances:
      metadataCircuitBreaker:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      metadataCircuitBreaker:
        timeout-duration: 3s
        cancel-running-future: true

spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  webflux:
    base-path: /
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: internal-to-metadata
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/internal/**
          #filters:
          #  - RewritePath=/api/internal/(?<segment>.*), /internal/${segment}

          # Authentication Service
        - id: csfc-auth-service
          uri: lb://CSFC-AUTH-SERVICE
          predicates:
            - Path=/api/auth-service/**
          #filters:
           # - RewritePath=/api/auth-service/(?<segment>.*), /auth/${segment}

   
        - id: authentication-service
          uri: lb://AUTHENTICATION-SERVICE
          predicates:
            - Path=/api/authentication-service/**
          filters:
            - RewritePath=/api/authentication-service/(?<segment>.*), /api/v1/${segment}

        # Engagement Service
        - id: engagement-service
          uri: lb://ENGAGEMENT-SERVICE
          predicates:
            - Path=/api/engagement-service/**
          #filters:
          #  - RewritePath=/api/engagement-service/(?<segment>.*), /api/engagement-service/${segment}

          #Metadata Service (Franchise / Shift / Metadata)
        - id: shift-service
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/shift-service/**
          #filters:
           # - RewritePath=/api/shift-service/(?<segment>.*), /api/shift-service/${segment}

        - id: metadata-service
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/metadata/**
          #filters:
           # - RewritePath=/api/metadata/(?<segment>.*), /api/metadata/${segment}


        - id: franchise-service
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/franchise-service/**
          #filters:
           # - RewritePath=/api/franchise-service/(?<segment>.*), /api/franchise-service/${segment}

    

          # Report Service
        - id: report-service
          uri: lb://REPORT-SERVICE
          predicates:
            - Path=/api/report-service/**
          #filters:
           # - RewritePath=/api/report-service/(?<segment>.*), /api/v1/${segment}

            # Supplier API
        - id: supplier-api
          uri: lb://WAREHOUSE-INVENTORY-SUPPLIER-SERVICE
          predicates:
            - Path=/api/suppliers/**
          #filters:
           # - RewritePath=/api/suppliers/(?<segment>.*), /${segment}

          # Warehouse API
        - id: warehouse-api
          uri: lb://WAREHOUSE-INVENTORY-SUPPLIER-SERVICE
          predicates:
            - Path=/api/warehouse-service/**
          #filters:
           # - RewritePath=/api/warehouse-service/(?<segment>.*), /${segment}

        # Inventory API
        - id: inventory-api
          uri: lb://WAREHOUSE-INVENTORY-SUPPLIER-SERVICE
          predicates:
            - Path=/api/inventory-service/**
          #filters:
           # - RewritePath=/api/inventory-service/(?<segment>.*), /${segment}

      # Product Service
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**


app:
  version: 1.0.0

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

security:
  jwt:
    secret: ${JWT_SECRET:V7Pz0c5ZmTz4IVBdBrgiapaNOSKpRDWtT8AsXm+C1mE=}

# --- CẤU HÌNH EUREKA CLIENT ---
eureka:
  instance:
    prefer-ip-address: false
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}
    secure-port: 443
    secure-port-enabled: true
    non-secure-port-enabled: false
    status-page-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/actuator/info
    health-check-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/actuator/health
    home-page-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/
    instance-id: ${spring.application.name}:${RENDER_EXTERNAL_HOSTNAME:localhost}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:https://microservice-59zl.onrender.com/eureka/}


management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  endpoint:
    health:
      show-details: always

rate-limit:
  ip:
    enabled: true
    config-key: gateway.ip.rate_limit.per_minute
    default-limit: 60
    window-seconds: 60
    refresh-seconds: 15

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name:}] [requestId:%X{requestId}] %logger - %msg%n"
