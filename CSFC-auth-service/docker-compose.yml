services:
  mysql:
    image: mysql:8.4
    container_name: csfc-auth-mysql
    env_file:
      - .env.docker
    ports:
      - "3309:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  auth-service:
    container_name: csfc-auth-service
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql-data:
